name: CI

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: auction
          POSTGRES_DB: auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auction"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      DATABASE_URL: postgres://auction:auction@localhost:5432/auction
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: @auction/db and the apps resolve @auction/domain's types
      # from its built dist/, so the workspace must be built before typecheck.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm db:migrate
      - run: pnpm test
