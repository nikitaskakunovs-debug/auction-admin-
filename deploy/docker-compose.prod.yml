# Production stack — one droplet, five containers.
# Run from the deploy/ directory: docker compose -f docker-compose.prod.yml up -d
# Configuration comes from deploy/.env (copy .env.example and fill it in).
name: auction

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: auction
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auction"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://auction:${POSTGRES_PASSWORD}@postgres:5432/auction
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set in .env}
      CORS_ORIGINS: https://${DOMAIN},https://www.${DOMAIN},https://admin.${DOMAIN}
      PUBLIC_BASE_URL: https://api.${DOMAIN}
      TRUST_PROXY: "1"
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-fra1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      EMAIL_MODE: ${EMAIL_MODE:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      VIES_MODE: live
      # Klix payments (off until the merchant keys arrive; then KLIX_MODE=live).
      STOREFRONT_BASE_URL: https://${DOMAIN}
      KLIX_MODE: ${KLIX_MODE:-off}
      KLIX_BRAND_ID: ${KLIX_BRAND_ID:-}
      KLIX_SECRET_KEY: ${KLIX_SECRET_KEY:-}
      KLIX_METHODS: ${KLIX_METHODS:-}
    volumes:
      # Only used if STORAGE_DRIVER=local; harmless otherwise.
      - uploads:/repo/apps/api/var/uploads

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
        NEXT_PUBLIC_ORIGIN_LV: ${ORIGIN_LV:-https://${DOMAIN}}
        NEXT_PUBLIC_ORIGIN_EE: ${ORIGIN_EE:-https://${DOMAIN}}
        NEXT_PUBLIC_ORIGIN_LT: ${ORIGIN_LT:-https://${DOMAIN}}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_URL: http://api:4000

  caddy:
    build:
      context: ..
      dockerfile: deploy/caddy.Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set in .env}
    depends_on:
      - api
      - web
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  uploads:
  caddy_data:
  caddy_config:
